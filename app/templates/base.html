<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLM Document Ingestion{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <header>
        <h1>LLM Document Ingestion Service</h1>
        <nav>
            <a href="/ui/upload" class="{% block nav_upload %}{% endblock %}">Upload</a>
            <a href="/ui/status" class="{% block nav_status %}{% endblock %}">Status</a>
            <a href="/ui/download" class="{% block nav_download %}{% endblock %}">Download</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
