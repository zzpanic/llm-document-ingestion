<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLM Document Ingestion{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <header>
        <div class="header-title">
            <h1>LLM Document Ingestion Service</h1>
            <p class="header-subtitle">Copyright Patrick Nichols &middot; zzpanic@gmail.com &middot; BSD-2-Clause License</p>
        </div>
        <nav>
            <a href="/ui/upload" class="{% block nav_upload %}{% endblock %}">Upload</a>
            <a href="/ui/status" class="{% block nav_status %}{% endblock %}">Status</a>
            <a href="/ui/preview" class="{% block nav_preview %}{% endblock %}">Preview</a>
            <a href="/ui/download" class="{% block nav_download %}{% endblock %}">Download</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <a href="https://github.com/zzpanic/llm-document-ingestion" target="_blank" rel="noopener">zzpanic/llm-document-ingestion</a>
        <span>v{{ app_version }}</span>
    </footer>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
