{% extends "base.html" %}
{% block title %}Download Results{% endblock %}
{% block nav_download %}active{% endblock %}

{% block content %}
<h2>Download Extracted Documents</h2>

<div class="section-block">
    <h3>Zip Archives</h3>
    <table class="status-table" id="zip-table">
        <thead>
            <tr>
                <th>Created</th>
                <th>File</th>
                <th>Size</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody id="zip-body">
            <tr><td colspan="4" style="color:#94a3b8;text-align:center;padding:1.5rem">Loading…</td></tr>
        </tbody>
    </table>
    <div class="actions" style="margin-top:0.75rem">
        <button id="clear-btn" class="btn btn-secondary">Clear Temp Folder</button>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
(function () {
    const zipBody   = document.getElementById('zip-body');
    const clearBtn  = document.getElementById('clear-btn');

    // ── Blob download (bypasses SmartScreen on Edge/Windows) ─
    async function downloadViaBlob(url, filename, linkEl) {
        const orig = linkEl.textContent;
        linkEl.textContent = 'Downloading…';
        linkEl.style.pointerEvents = 'none';
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(resp.status);
            const blob = await resp.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
        } catch (e) {
            alert('Download failed: ' + e.message);
        } finally {
            linkEl.textContent = orig;
            linkEl.style.pointerEvents = '';
        }
    }

    // ── Zip list ─────────────────────────────────────────

    function loadZips() {
        fetch('/temp/zips')
            .then(r => r.json())
            .then(data => {
                if (!data.zips.length) {
                    zipBody.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;text-align:center;padding:1.5rem">No zip archives yet.</td></tr>';
                    return;
                }
                zipBody.innerHTML = data.zips.map(z => `
                    <tr>
                        <td style="white-space:nowrap">${z.created}</td>
                        <td style="font-family:monospace;font-size:0.8rem">${escHtml(z.filename)}</td>
                        <td style="white-space:nowrap">${z.size_kb} KB</td>
                        <td><a href="#" data-dl-url="/download/zip/${encodeURIComponent(z.filename)}" data-dl-name="${escHtml(z.filename)}">Download</a></td>
                    </tr>
                `).join('');
            })
            .catch(() => {
                zipBody.innerHTML = '<tr><td colspan="4" style="color:#ef4444;text-align:center">Could not load zip list.</td></tr>';
            });
    }

    document.getElementById('zip-table').addEventListener('click', e => {
        const a = e.target.closest('a[data-dl-url]');
        if (!a) return;
        e.preventDefault();
        downloadViaBlob(a.dataset.dlUrl, a.dataset.dlName, a);
    });

    clearBtn.addEventListener('click', async () => {
        if (!confirm('Delete all zip archives from the temp folder?')) return;
        clearBtn.disabled = true;
        clearBtn.textContent = 'Clearing…';
        try {
            const r = await fetch('/temp/clear', { method: 'POST' });
            const d = await r.json();
            clearBtn.textContent = `Cleared ${d.deleted} file(s)`;
            loadZips();
        } catch (_) {
            clearBtn.textContent = 'Error — try again';
        } finally {
            setTimeout(() => { clearBtn.disabled = false; clearBtn.textContent = 'Clear Temp Folder'; }, 2000);
        }
    });

    loadZips();

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
})();
</script>
{% endblock %}
