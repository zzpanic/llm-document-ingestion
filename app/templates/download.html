{% extends "base.html" %}
{% block title %}Download Results{% endblock %}
{% block nav_download %}active{% endblock %}

{% block content %}
<h2>Download Extracted Documents</h2>

<div id="summary" class="summary-panel">
    <span>Loading…</span>
</div>

<div class="section-block">
    <h3>Individual Pages</h3>
    <ul id="page-list" class="page-list">
        <li class="empty">Loading…</li>
    </ul>
</div>

<div class="section-block">
    <h3>Archive</h3>
    <a id="zip-link" href="/download/zip" class="btn btn-primary">Download Zip Archive</a>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const summary  = document.getElementById('summary');
    const pageList = document.getElementById('page-list');
    const zipLink  = document.getElementById('zip-link');

    const fileIds = JSON.parse(sessionStorage.getItem('fileIds') || '[]');

    if (!fileIds.length) {
        summary.innerHTML = '<span>No session data found. <a href="/ui/upload">Upload files first</a>.</span>';
        pageList.innerHTML = '';
        zipLink.style.display = 'none';
        return;
    }

    fetch('/status')
        .then(r => r.json())
        .then(data => {
            const statusMap = data.status || {};
            const states    = fileIds.map(id => (statusMap[id] || {}).state);
            const total     = fileIds.length;
            const done      = states.filter(s => s === 'done').length;
            const failed    = states.filter(s => s === 'failed').length;

            summary.innerHTML = `
                <span>Total: <strong>${total}</strong></span>
                <span>Done: <strong style="color:#166534">${done}</strong></span>
                <span>Failed: <strong style="color:#991b1b">${failed}</strong></span>
            `;

            const doneIds = fileIds.filter(id => (statusMap[id] || {}).state === 'done');

            if (doneIds.length === 0) {
                pageList.innerHTML = '<li class="empty">No pages extracted yet. <a href="/ui/status">Check status</a>.</li>';
                zipLink.style.display = 'none';
            } else {
                pageList.innerHTML = doneIds.map(id =>
                    `<li><a href="/download/pages/${id}" download="${id}.md">${id}.md</a></li>`
                ).join('');
            }
        })
        .catch(() => {
            summary.innerHTML = '<span>Could not load status. <a href="/ui/status">Go to Status page</a>.</span>';
        });
})();
</script>
{% endblock %}
