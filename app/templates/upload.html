{% extends "base.html" %}
{% block title %}Upload Documents{% endblock %}
{% block nav_upload %}active{% endblock %}

{% block content %}
<h2>Upload Document Images</h2>

<div id="drop-zone" class="drop-zone">
    <p>Drag and drop image files here, or click to select</p>
    <small>PNG or JPG &nbsp;·&nbsp; Max 10 MB per file</small>
    <input type="file" id="file-input" multiple accept="image/png,image/jpeg" style="display:none">
</div>

<div id="file-list" class="file-list"></div>
<div id="error-msg" class="error-message"></div>

<div class="actions">
    <button id="go-btn" class="btn btn-primary" disabled>Upload &amp; Process</button>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileList  = document.getElementById('file-list');
    const goBtn     = document.getElementById('go-btn');
    const errorMsg  = document.getElementById('error-msg');

    let selectedFiles = [];

    const MAX_SIZE_MB = 10;
    const ALLOWED     = ['image/png', 'image/jpeg'];

    // ── File selection ───────────────────────────────────

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(fileObjs) {
        showError('');
        const rejected = [];
        for (const f of fileObjs) {
            if (!ALLOWED.includes(f.type)) { rejected.push(`${f.name}: unsupported type (PNG/JPG only)`); continue; }
            if (f.size > MAX_SIZE_MB * 1024 * 1024) { rejected.push(`${f.name}: exceeds ${MAX_SIZE_MB} MB`); continue; }
            selectedFiles.push(f);
        }
        if (rejected.length) showError(rejected.join(' · '));
        renderFileList();
        goBtn.disabled = selectedFiles.length === 0;
    }

    function removeFile(idx) {
        selectedFiles.splice(idx, 1);
        renderFileList();
        goBtn.disabled = selectedFiles.length === 0;
    }

    function renderFileList() {
        fileList.innerHTML = selectedFiles.map((f, i) => `
            <div class="file-item">
                <span class="file-item-name">${escHtml(f.name)}</span>
                <span class="file-item-size">${(f.size / 1024).toFixed(1)} KB</span>
                <button class="remove-btn" onclick="removeFile(${i})" title="Remove">&#x2715;</button>
            </div>
        `).join('');
    }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.toggle('visible', !!msg);
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    window.removeFile = removeFile;

    // ── Upload & Process ─────────────────────────────────

    goBtn.addEventListener('click', async () => {
        showError('');
        goBtn.disabled = true;
        goBtn.textContent = 'Uploading…';

        try {
            const formData = new FormData();
            for (const f of selectedFiles) formData.append('files', f);

            const upResp = await fetch('/upload', { method: 'POST', body: formData });
            if (!upResp.ok) {
                const err = await upResp.json().catch(() => ({}));
                throw new Error(err.detail || `Upload failed (${upResp.status})`);
            }
            const upData = await upResp.json();
            const fileIds = upData.uploaded.map(u => u.id);
            const filenameMap = {};
            upData.uploaded.forEach(u => { filenameMap[u.id] = u.filename; });

            goBtn.textContent = 'Starting extraction…';

            const procResp = await fetch('/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_ids: fileIds }),
            });
            if (!procResp.ok) {
                const err = await procResp.json().catch(() => ({}));
                throw new Error(err.detail || `Process failed (${procResp.status})`);
            }

            sessionStorage.setItem('fileIds', JSON.stringify(fileIds));
            sessionStorage.setItem('filenameMap', JSON.stringify(filenameMap));
            window.location.href = '/ui/status';
        } catch (e) {
            showError(e.message);
            goBtn.disabled = false;
            goBtn.textContent = 'Upload & Process';
        }
    });
})();
</script>
{% endblock %}
