services:
  document-ingestion:
    build: .
    container_name: llm-document-ingestion
    ports:
      - "8000:8000"
    environment:
      # Edit these values directly in Dockge — no .env file needed.
      # LM Studio endpoint:
      #   Mac/Windows Docker Desktop : http://host.docker.internal:1234
      #   Linux host (use LAN IP)    : http://192.168.1.81:1234
      - LM_STUDIO_ENDPOINT=http://host.docker.internal:1234
      - LITELM_API_MODEL=qwen3.5-9b
      # Application settings
      - MAX_IMAGES_PER_BATCH=300
      - MAX_IMAGE_SIZE_MB=10
    volumes:
      - ./uploads:/app/uploads
      - ./extracted:/app/extracted
      - ./output:/app/output
      - ./temp:/app/temp
      - ./prompt.txt:/app/prompt.txt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s